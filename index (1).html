<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEC Lockout/Tagout Rev 4 — Interactive Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1a5078; --navy-dk:#0f3a5c; --navy-deep:#0a2a44;
    --gold:#c49b2c; --gold-dk:#9d7c1f;
    --ink:#14171c; --ink-soft:#4a525e; --paper:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'IBM Plex Sans',system-ui,sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg,var(--navy-deep),var(--navy));
    padding:24px;
  }
  .card{
    background:var(--paper);
    border-radius:24px;
    box-shadow:0 12px 40px rgba(0,0,0,0.35);
    max-width:520px; width:100%;
    padding:48px 40px;
    text-align:center;
  }
  .logo{height:96px;width:auto;margin-bottom:24px;}
  .eyebrow{
    font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--gold-dk);margin-bottom:8px;
  }
  h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:42px;line-height:1.0;letter-spacing:.01em;
    color:var(--navy-deep);margin-bottom:8px;
  }
  .sub{font-size:15px;color:var(--ink-soft);margin-bottom:36px;}
  .choose{font-size:13px;font-weight:600;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;}
  .langs{display:flex;flex-direction:column;gap:14px;}
  a.btn{
    display:flex;align-items:center;justify-content:space-between;
    text-decoration:none;
    background:var(--navy);color:#fff;
    padding:18px 24px;border-radius:14px;
    font-size:18px;font-weight:600;
    transition:transform .12s ease, background .12s ease;
    box-shadow:0 4px 0 var(--navy-dk);
  }
  a.btn:hover{background:var(--navy-dk);transform:translateY(2px);box-shadow:0 2px 0 var(--navy-dk);}
  a.btn .flag{font-size:22px;}
  a.btn .arrow{opacity:.7;}
  .foot{margin-top:32px;font-size:12px;color:var(--ink-soft);}
</style>
</head>
